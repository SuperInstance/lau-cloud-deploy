# =============================================================================
# Secret — API keys and sensitive configuration
# WARNING: Use sealed-secrets or external-secrets-operator in production!
# This is a template — replace values before deploying.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: lau-secrets
  namespace: lau-stack
  labels:
    app.kubernetes.io/name: lau-stack
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Replace these with actual values
  API_KEY: "CHANGE_ME_API_KEY"
  DATABASE_URL: "postgresql://lau:CHANGE_ME@postgres:5432/lau"
  JWT_SECRET: "CHANGE_ME_JWT_SECRET"
  S3_ACCESS_KEY: "CHANGE_ME_S3_ACCESS"
  S3_SECRET_KEY: "CHANGE_ME_S3_SECRET"
  OCI_TENANT_ID: "CHANGE_ME_OCI_TENANT"
  OCI_USER_ID: "CHANGE_ME_OCI_USER"
  OCI_FINGERPRINT: "CHANGE_ME_OCI_FINGERPRINT"
  OCI_PRIVATE_KEY: |
    CHANGE_ME_OCI_PRIVATE_KEY
